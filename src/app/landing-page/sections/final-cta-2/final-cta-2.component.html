<section class="py-24">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="bg-primary rounded-3xl p-10 md:p-16 text-center text-white relative overflow-hidden shadow-2xl">
      <div class="relative z-10">
        <h2 class="text-3xl md:text-5xl font-black mb-6">Start Your First Aptitude Test Free</h2>
        <p class="text-lg text-white/80 mb-10 max-w-2xl mx-auto">Join 500+ colleges using our platform to streamline their placement rounds and identify top talent.</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <a [href]="links.studentHome" class="bg-white text-primary px-8 py-4 rounded-xl font-bold text-lg hover:bg-slate-50 transition-all shadow-xl inline-block">Create Test Now</a>
          <a [href]="links.accountContact" class="bg-primary/20 backdrop-blur-sm border border-white/30 text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-white/10 transition-all inline-block">Contact Sales</a>
        </div>
      </div>
      <!-- Background Design Element -->
      <div class="absolute top-0 right-0 -translate-y-1/2 translate-x-1/2 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
      <div class="absolute bottom-0 left-0 translate-y-1/2 -translate-x-1/2 w-64 h-64 bg-slate-900/10 rounded-full blur-2xl"></div>
    </div>
  </div>
</section>
