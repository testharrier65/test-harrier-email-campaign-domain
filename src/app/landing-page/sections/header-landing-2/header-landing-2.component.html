<header class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      <a [href]="links.home" class="flex items-center gap-2">
        <div class="size-10 shrink-0 rounded-lg bg-primary flex items-center justify-center text-white">
          <span class="material-symbols-outlined text-2xl">rocket_launch</span>
        </div>
        <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">TestHarrier</span>
      </a>
      <nav class="hidden md:flex items-center gap-8">
        <a class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-primary transition-colors cursor-pointer" href="#features" (click)="scrollToSection('features'); $event.preventDefault()">Features</a>
        <a class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-primary transition-colors cursor-pointer" href="#question-coverage" (click)="scrollToSection('question-coverage'); $event.preventDefault()">Question Bank</a>
        <a class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-primary transition-colors" [href]="links.pricing">Pricing</a>
        <a class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-primary transition-colors cursor-pointer" href="#features" (click)="scrollToSection('features'); $event.preventDefault()">How it works</a>
      </nav>
      <div class="flex items-center gap-3">
        <a class="hidden sm:block px-4 py-2 text-sm font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-all" [href]="links.studentHome">Login</a>
        <a class="bg-primary hover:bg-primary/90 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-sm transition-all inline-block text-center" [href]="links.studentHome">Create Test</a>
      </div>
    </div>
  </div>
</header>
